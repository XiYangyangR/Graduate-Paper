# 实验一配置：只加源语言标签（中文），目标语言无标签
model:
  name: "facebook/nllb-200-distilled-600M"   # 或 "facebook/mbart-large-50"
  src_lang: "zho_Hans"                       # 源语言标签（中文）
  tgt_lang: "hani_Latn"                       # 目标语言标签（哈尼语）

data:
  train_src: "data/train.zh"
  train_tgt: "data/train.hani"
  valid_src: "data/valid.zh"
  valid_tgt: "data/valid.hani"
  test_src: "data/test.zh"
  test_tgt: "data/test.hani"
  max_length: 32

training:
  output_dir: "outputs/exp1_nllb"
  num_train_epochs: 30
  per_device_train_batch_size: 128
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 0.00005
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 1
  logging_steps: 10
  report_to: "tensorboard"
  predict_with_generate: true

evaluation:
  metrics: ["sacrebleu", "chrf"]
  test_batch_size: 64